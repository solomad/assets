<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light">
    <title>My Assets - Archive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">My Assets Archive</div>
        <div class="navbar-actions">
            <label for="fileInput" class="upload-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Загрузить data.json
            </label>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <a href="https://github.com/solomad/assets" target="_blank" class="github-link">GitHub</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Боковая панель фильтров -->
        <aside class="sidebar">
            <div class="filter-section search-section">
                <input type="text" id="searchInput" placeholder="Search for my assets...">
            </div>

            <div class="filter-section">
                <h3>License / Price</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="priceFilter" value="All" checked>
                        <span class="custom-radio"></span> Все
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="priceFilter" value="Free">
                        <span class="custom-radio"></span> Бесплатные
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="priceFilter" value="Paid">
                        <span class="custom-radio"></span> Платные
                    </label>
                </div>
            </div>
            
            <div class="sidebar-info" id="dbInfo">
                Ожидание данных...
            </div>
        </aside>

        <!-- Основной контент (список) -->
        <main class="content">
            <div class="content-header">
                <div class="results-count" id="resultsCount">0 items</div>
                <div class="sort-controls">
                    <span class="sort-label">Sort by:</span>
                    <select id="sortSelect" class="sort-select">
                        <option value="default">Default</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                    </select>
                </div>
            </div>

            <div class="asset-list" id="assetList">
                <!-- Карточки генерируются здесь -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
