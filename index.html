<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Asset Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23222c37'><path d='M11.23 1l-7.79 4.5v9L11.23 19l7.79-4.5v-9L11.23 1zm6.5 12.75l-6.5 3.75-6.5-3.75v-7.5l6.5-3.75 6.5 3.75v7.5z'/></svg>">
</head>
<body>
    <svg width="0" height="0" style="position: absolute; width: 0; height: 0; overflow: hidden;">
        <defs>
            <linearGradient id="halfStarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="50%" stop-color="#f59e0b" />
                <stop offset="50%" stop-color="#d1d5db" />
            </linearGradient>
        </defs>
    </svg>

    <header class="top-nav">
        <div class="nav-content">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
                    <path d="M11.23 1l-7.79 4.5v9L11.23 19l7.79-4.5v-9L11.23 1zm6.5 12.75l-6.5 3.75-6.5-3.75v-7.5l6.5-3.75 6.5 3.75v7.5z"/>
                </svg>
                <span>My Asset Archive</span>
            </div>
            
            <div class="nav-actions">
				<div class="view-toggles" style="display: flex; gap: 12px; border-right: 1px solid rgba(255,255,255,0.2); padding-right: 12px; margin-right: 4px;">
					<label class="toggle-label" title="Показывать рейтинг">
						<input type="checkbox" id="toggleRatings" checked> ⭐
					</label>
					<label class="toggle-label" title="Показывать теги">
						<input type="checkbox" id="toggleTags" checked> 🏷️
					</label>
				</div>
                <div class="grid-select-wrapper">
                    <label for="gridColsSelect">Scale</label>
                    <select id="gridColsSelect" class="grid-select">
                        <option value="4">4</option>
                        <option value="5" selected>5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                    </select>
                </div>

                <label for="fileInput" class="upload-btn" title="Upload fresh data.json">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span>Upload JSON</span>
                </label>
                <input type="file" id="fileInput" accept=".json" style="display: none;" multiple>
                
                <span class="version-badge" title="App Version">v1.1</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <main class="content-area">
            <div class="results-header">
                <h2 id="resultsInfo">Loading database...</h2>
            </div>
            <div id="assetGrid" class="asset-grid">
                </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-block">
                <h3>Search by Name</h3>
                <input type="text" id="searchInput" class="search-input" placeholder="Asset name...">
            </div>

            <div class="sidebar-block">
                <h3>Sort by</h3>
                <select id="sortSelect" class="sort-select">
                    <option value="default">Default</option>
                    <option value="name-asc">Alphabetical (A-Z)</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating-desc">Rating: High to Low</option>
                    <option value="rating-asc">Rating: Low to High</option>
                </select>
            </div>

            <div class="sidebar-block">
                <h3>Labels</h3>
                <div class="checkbox-list scrollable-list" id="labelsList"></div>
            </div>

            <div class="sidebar-block">
                <h3>Categories</h3>
                <div class="checkbox-list scrollable-list" id="categoriesList"></div>
            </div>

            <div class="sidebar-block">
                <h3>Publishers</h3>
                <input type="text" id="publisherSearch" class="search-input pub-search" placeholder="Search publisher...">
                <div class="checkbox-list scrollable-list" id="publishersList"></div>
            </div>
        </aside>
    </div>

    <button id="backToTopBtn" class="back-to-top" aria-label="Back to top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script src="app.js"></script>
</body>
</html>
